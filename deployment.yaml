apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app   # 🔥 MUST MATCH
    spec:
      containers:
      - name: flask-app
        image: sanketamte123/sanket-app:v1
        ports:
        - containerPort: 3000
